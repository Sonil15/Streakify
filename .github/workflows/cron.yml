name: Daily Streak Reminder

# Runs every day at 8:00 PM IST = 14:30 UTC
on:
  schedule:
    - cron: "30 14 * * *"
  # Allow manual trigger for testing
  workflow_dispatch:

jobs:
  send-reminders:
    name: Send Telegram Streak Reminders
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run reminder job
        env:
          # Firebase service-account JSON (paste the entire JSON as a secret)
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
          # Telegram bot token from BotFather
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
        run: python reminder_job.py
